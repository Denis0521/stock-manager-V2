<style>
/* 核心變數引擎與基礎排版 (保留原樣式以確保 UI 不變) */
:root { 
  --bg: #E8ECF1; --bg-card: #FFFFFF; --s-light: #FFFFFF; --s-dark: #B8C4D0; 
  --t-main: #1A2332; --t-muted: #6B7B8D; --up: #DC2626; --down: #16A34A; 
  --engrave-l: rgba(255,255,255,0.9); --engrave-d: rgba(0,0,0,0.12); 
  --protrude-l: rgba(255,255,255,1); --protrude-d: rgba(0,0,0,0.06); 
  --accent: #2563EB; --border-light: #D1D8E0; 
  --shadow-soft: 4px 4px 8px var(--s-dark), -4px -4px 8px var(--s-light);
  --shadow-strong: 6px 6px 14px var(--s-dark), -6px -6px 14px var(--s-light);
  --shadow-inset: inset 4px 4px 8px var(--s-dark), inset -4px -4px 8px var(--s-light);
}
body.tech { --bg: #1E2330; --bg-card: #2D3344; --s-light: #2D3344; --s-dark: #151820; --t-main: #F8FAFC; --t-muted: #94A3B8; --up: #FF5252; --down: #4ADE80; --engrave-l: rgba(255,255,255,0.12); --engrave-d: rgba(0,0,0,0.5); --protrude-l: rgba(255,255,255,0.18); --protrude-d: rgba(0,0,0,0.35); --accent: #60A5FA; --border-light: #3D4556; }
body.blue-light { --bg: #D0DEE8; --bg-card: #E8F0F8; --s-light: #E8F0F8; --s-dark: #8CA0B8; --t-main: #061220; --t-muted: #3A5A7A; --up: #DC2626; --down: #16A34A; --engrave-l: rgba(255,255,255,0.95); --engrave-d: rgba(0,0,0,0.16); --protrude-l: rgba(255,255,255,1); --protrude-d: rgba(0,0,0,0.08); --accent: #1E40AF; --border-light: #A8B8C8; }
body.purple-light { --bg: #EDE8F4; --bg-card: #FAF7FF; --s-light: #FAF7FF; --s-dark: #B8A8CC; --t-main: #1E0B3A; --t-muted: #6B5B8E; --up: #E11D48; --down: #10B981; --engrave-l: rgba(255,255,255,0.95); --engrave-d: rgba(0,0,0,0.14); --protrude-l: rgba(255,255,255,1); --protrude-d: rgba(0,0,0,0.06); --accent: #7C3AED; --border-light: #C8B8D8; }
body.pink { --bg: #F5E8EC; --bg-card: #FFF5F7; --s-light: #FFF5F7; --s-dark: #D4A8B8; --t-main: #3A0A2A; --t-muted: #8B5A6B; --up: #DC2626; --down: #059669; --engrave-l: rgba(255,255,255,0.9); --engrave-d: rgba(0,0,0,0.12); --protrude-l: rgba(255,255,255,0.95); --protrude-d: rgba(0,0,0,0.06); --accent: #DB2777; --border-light: #D8B8C4; }

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--t-main); padding:0 0 60px; min-height:100vh; font-size:15px; overflow-x:hidden; transition:all 0.4s ease}
input,select,button{font-family:inherit;font-size:inherit;outline:none;text-align:center}

.header, .tabs-bar, .card, .idx-scroll-container, .table-scroll, .summary, .hist-item, .backup-box { background: var(--bg-card); box-shadow: var(--shadow-soft); border-radius: 12px; border: 1px solid var(--border-light); margin: 8px 10px; }
.header { margin:0; box-shadow: var(--shadow-strong); border-bottom: 2px solid var(--s-dark); border-radius: 0 0 16px 16px; padding: 12px 10px 4px; position: sticky; top: 0; z-index: 100; }
.header-top { display: flex; align-items: center; justify-content: space-between; }
.header h1 { font-size: 20px; font-weight: 700; margin-left: 6px; }
.hdr-right { display: flex; gap: 6px; }

.news-ticker-container { margin-top: 16px; display: flex; align-items: center; height: 34px; overflow: hidden; }
.ticker-scroll-area { flex: 1; overflow: hidden; position: relative; }
.ticker-wrap { display: inline-block; white-space: nowrap; padding-left: 100%; animation: ticker linear infinite; }
.ticker-item { padding: 0 20px; color: var(--accent); font-weight: 700; text-decoration: none; }
.ticker-source { color: var(--t-muted); font-size: 11px; margin-right: 6px; border: 1px solid var(--border-light); padding: 2px 4px; border-radius: 4px; }
@keyframes ticker { 0% { transform: translate3d(0, 0, 0); } 100% { transform: translate3d(-100%, 0, 0); } }

.tabs-bar { padding: 6px 10px; gap: 8px; display: flex; }
.card { padding: 12px 16px; }
.card-title { font-size: 16px; color: var(--t-muted); margin-bottom: 8px; font-weight: 600; text-transform: uppercase; }
.form-row { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }

input, select { flex: 1; padding: 12px; background: var(--bg-card); border: 1px solid var(--border-light); border-radius: 8px; box-shadow: var(--shadow-inset); color: var(--t-main); font-weight: 600; text-align: left; }
button, .tab-btn { background: var(--bg-card); border: 1px solid var(--border-light); border-radius: 8px; padding: 10px 16px; box-shadow: var(--shadow-soft); color: var(--t-main); font-weight: 600; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
button:hover, .tab-btn:hover { transform: translateY(-1px); box-shadow: var(--shadow-strong); }
button:active, .tab-btn.active { transform: translateY(0); box-shadow: var(--shadow-inset); color: var(--accent); border-color: var(--accent); }
.tab-btn { flex: 1; padding: 10px 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.btn-save { width: calc(100% - 20px); padding: 14px; font-size: 17px; margin: 8px 10px; }

.idx-scroll-container { overflow-x: auto; display: flex; padding: 2px 0; scroll-snap-type: x mandatory; }
.idx-scroll-container::-webkit-scrollbar { height: 0; }
.idx-card-box { flex: 0 0 auto; min-width: 160px; padding: 2px 16px; scroll-snap-align: start; border-right: 1px solid var(--s-dark); }
.idx-card-box:last-child { border-right: none; }
.idx-box-name { font-size: 18px; color: var(--t-muted); font-weight: 600; } 
.idx-box-price { font-size: 18px; font-weight: 700; margin: 1px 0; }
.idx-box-change-row { display: flex; gap: 6px; font-size: 16px; font-weight: 600; }
.idx-box-src { font-size: 11px; color: var(--t-muted); text-align: right; opacity: 0.7; }

.table-scroll { overflow-x: auto; padding: 0; }
.list-wrap { min-width: 670px; } 
.list-header, .srow { display: grid; grid-template-columns: 110px 95px 75px 75px 75px 85px 105px 70px; align-items: stretch; border-bottom: 1px solid var(--s-dark); font-size: 17px; }
.list-header { border-bottom-width: 2px; color: var(--t-muted); font-weight: 600; }
.list-header > div, .srow > div { padding: 6px 4px; display: flex; flex-direction: column; justify-content: center; align-items: flex-end; text-align: right; white-space: nowrap; } 
.list-header > div:first-child, .srow > div:first-child { align-items: flex-start; text-align: left; position: sticky; left: 0; background: var(--bg-card); padding-left: 8px; z-index: 2;}
.srow > div:last-child { flex-direction: row; align-items: center; justify-content: center; gap: 4px; }
.srow .sym { font-weight: 800; color: var(--t-main); cursor: pointer; }
.srow .qty-cell, .srow .total { font-weight: 600; overflow: hidden; width: 100%; }
.srow .price, .srow .chgp, .srow .chg, .srow .today-pnl { font-weight: 700; }
.srow .act button { padding: 6px 10px; font-size: 15px; border-radius: 6px; }

.summary { padding: 12px 16px; }
.sum-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; }
.sum-row .lab { color: var(--t-muted); font-weight: 600; }
.sum-row .val { font-size: 20px; font-weight: 800; }
.sum-divider { height: 2px; background: var(--s-dark); opacity: 0.5; margin: 6px 0; }
.sum-toggle-btn { text-align: center; font-size: 15px; font-weight: 700; cursor: pointer; color: var(--t-muted); }

.hist-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; margin-top: 8px; }
.hist-item .hdate { color: var(--t-muted); font-size: 14px; }
.hist-item .hval { font-weight: 800; font-size: 17px; }

.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 999; align-items: flex-start; justify-content: center; }
.modal-overlay.show { display: flex; }
.modal { position: relative; border-radius: 20px; padding: 24px 20px; width: calc(100% - 28px); max-width: 400px; max-height: calc(100% - 40px); overflow-y: auto; background: var(--bg-card); margin-top: 20px; }
.modal.fullscreen-modal { width: 100vw; max-width: 100vw; height: 100vh; max-height: 100vh; margin: 0; border-radius: 0; }
.modal h2 { font-size: 20px; margin-bottom: 16px; text-align: center; color: var(--t-main); }
.modal label { display: block; font-size: 15px; color: var(--t-muted); margin: 12px 0 6px; font-weight: 600; text-align: left; }
.btn-close-icon { position: absolute; top: 15px; right: 15px; background: transparent; box-shadow: none; font-size: 24px; border: none; cursor: pointer; }

.toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: var(--t-main); color: var(--bg-card); padding: 12px 24px; border-radius: 30px; font-weight: bold; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 9999; }
.toast.show { opacity: 1; }

.up { color: var(--up) !important; }
.down { color: var(--down) !important; }
.neutral { color: var(--t-main) !important; }

/* RWD 斷點設定保留 */
@media (max-width: 360px) { .header h1 { font-size: 16px; } }
@media (min-width: 768px) {
  body { max-width: 600px; margin: 0 auto; font-size: 16px; }
  .modal { max-width: 560px; padding: 32px; }
}
</style>

<script>
/* =================== 核心工具與儲存封裝 =================== */
const lsGet = (k, def=null) => localStorage.getItem(k) || def;
const lsSet = (k, v) => { try { localStorage.setItem(k, v); } catch(e){} };
const lsGetJSON = (k, def=[]) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : def; } catch { return def; } };
const lsSetJSON = (k, v) => lsSet(k, JSON.stringify(v));

const STOCK_DICT = { '0050':'元大台灣50', '2330':'台積電', '2317':'鴻海', '2454':'聯發科' /* 可依需求擴充 */ };
const FUGLE = 'https://api.fugle.tw/marketdata/v1.0/stock/intraday/quote/';
let cfWorkerUrl = 'https://yahoo-index-proxy.denis0521.workers.dev';

/* =================== 系統狀態變數 =================== */
let state = {
  tabCount: parseInt(lsGet('tw_tab_count', '3')),
  currentTab: parseInt(lsGet('tw_current_tab', '0')),
  tabNames: lsGetJSON('tw_tab_names', ['分頁 1','分頁 2','分頁 3','分頁 4','分頁 5']),
  fugleKey: lsGet('tw_fugle_key', ''),
  secondFugleKey: lsGet('tw_second_fugle_key', ''),
  showTicker: lsGet('tw_show_ticker', 'true') === 'true',
  stocks: Array.from({length: 5}, (_, i) => lsGetJSON(`tw_stock_portfolio_tab_${i}`)),
  records: Array.from({length: 5}, (_, i) => lsGetJSON(`tw_records_tab_${i}`)),
  foreignIndices: lsGetJSON('tw_custom_foreign_indices', [{ symbol: '^DJI', name: '🇺🇸 道瓊工業指數' }, { symbol: '^IXIC', name: '🇺🇸 那斯達克指數' }])
};

let currentInterval = 20000, keyIndex = 0;

/* =================== 初始化與 UI 渲染 =================== */
function init() {
  applyTheme(lsGet('tw_theme', 'light'));
  document.getElementById('tickerContainer').style.display = state.showTicker ? 'flex' : 'none';
  document.getElementById('tabCountSelect').value = state.tabCount;
  document.getElementById('fugleKeyInput').value = state.fugleKey;
  document.getElementById('secondFugleKeyInput').value = state.secondFugleKey;
  
  if (state.tabCount > 0 && state.currentTab >= state.tabCount) state.currentTab = 0;
  
  renderTabs();
  renderAll();
  renderHistory();
  loadFinanceNews();
  forceRefresh();
  
  // Modal 點擊背景關閉
  document.querySelectorAll('.modal-overlay').forEach(el => {
    el.addEventListener('click', e => { if (e.target === el) closeModal(el.id); });
  });
}

function applyTheme(t) {
  document.body.className = t === 'light' ? '' : t;
  const iconMap = { 'tech':'🚀', 'blue-light':'💎', 'purple-light':'🍇', 'pink':'🌸', 'light':'☀️' };
  document.getElementById('themeBtn').textContent = iconMap[t] || '☀️';
  lsSet('tw_theme', t);
}

function toggleTheme() {
  const themes = ['light', 'tech', 'blue-light', 'purple-light', 'pink'];
  const curIdx = themes.indexOf(document.body.className || 'light');
  applyTheme(themes[(curIdx + 1) % themes.length]);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

/* =================== Modal 控制 =================== */
function openModal(id) { document.getElementById(id).classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }

/* =================== 分頁控制 =================== */
function renderTabs() {
  const container = document.getElementById('tabsBarContainer');
  if (state.tabCount === 0) { container.style.display = 'none'; return; }
  
  container.style.display = 'flex';
  container.innerHTML = state.tabNames.slice(0, state.tabCount).map((name, i) => 
    `<button class="tab-btn ${i === state.currentTab ? 'active' : ''}" onclick="switchTab(${i})" ondblclick="renameTab(${i})">${name}</button>`
  ).join('');
}

function switchTab(idx) {
  if (state.currentTab === idx) return;
  state.currentTab = idx; lsSet('tw_current_tab', idx);
  renderTabs(); renderAll(); renderHistory(); forceRefresh();
}

function renameTab(idx) {
  const newName = prompt('請輸入此分頁的新名稱：', state.tabNames[idx]);
  if (newName !== null) {
    state.tabNames[idx] = newName.trim() || `分頁 ${idx + 1}`;
    lsSetJSON('tw_tab_names', state.tabNames);
    renderTabs(); showToast('已更名');
  }
}

/* =================== 股票列表與計算邏輯 =================== */
function getCalculatedData(s) {
  const shares = s.displayUnit === '張' ? s.displayQty * 1000 : s.displayQty;
  const price = s.price ?? null;
  const chg = s.change ?? 0;
  
  let todayPnl = price != null ? Math.round(shares * chg) : 0;
  let mktValue = price != null ? Math.round(shares * price) : 0;
  let unPnl = 0, roi = 0;
  
  if (price != null && s.buyPrice > 0) {
    const cost = s.buyPrice * shares;
    unPnl = Math.round(mktValue - cost);
    roi = (unPnl / cost) * 100;
  }
  return { shares, price, chg, todayPnl, mktValue, unPnl, roi, hasCost: s.buyPrice > 0 };
}

function renderAll() {
  const currentStocks = state.stocks[state.currentTab];
  const body = document.getElementById('listBody');
  const empty = document.getElementById('emptyState');
  const tableWrap = document.getElementById('tableScroll');
  
  if (currentStocks.length === 0) {
    empty.style.display = 'block'; tableWrap.style.display = 'none';
    document.getElementById('summaryArea').style.display = 'none';
    document.getElementById('saveArea').style.display = 'none';
    return;
  }
  
  empty.style.display = 'none'; tableWrap.style.display = 'block';
  document.getElementById('summaryArea').style.display = 'block';
  document.getElementById('saveArea').style.display = 'block';

  body.innerHTML = currentStocks.map(s => {
    const d = getCalculatedData(s);
    const pClass = d.chg >= 0 ? 'up' : 'down';
    const totalHtml = d.hasCost && d.price != null 
      ? `<div style="line-height:1.2;">${d.unPnl >= 0 ? '+' : ''}${d.unPnl.toLocaleString()}</div><div style="font-size:0.8em;opacity:0.85;">${d.roi >= 0 ? '+' : ''}${d.roi.toFixed(2)}%</div>`
      : `<div class="neutral">—</div><div style="font-size:0.8em;opacity:0.6;">未設均價</div>`;

    return `<div class="srow" data-id="${s.id}">
      <div class="sym-container">
        <div class="sym" onclick="openEditModal('${s.id}')">${s.symbol}</div>
        ${s.name ? `<div style="font-size:12px;color:var(--t-muted);">${s.name}</div>` : ''}
      </div>
      <div class="qty-cell">
        <div>${s.displayQty} ${s.displayUnit}</div>
        <div style="font-size:0.8em;color:var(--t-muted);">${s.buyPrice ? '均價 '+s.buyPrice : '未設'}</div>
      </div>
      <div class="price ${d.price != null ? pClass : ''}">${d.price ?? '—'}</div>
      <div class="chgp ${s.changePercent != null ? pClass : ''}">${s.changePercent != null ? (s.changePercent>=0?'+':'')+s.changePercent.toFixed(2)+'%' : '—'}</div>
      <div class="chg ${s.change != null ? pClass : ''}">${s.change != null ? (d.chg>=0?'+':'')+d.chg.toFixed(2) : '—'}</div>
      <div class="today-pnl ${d.todayPnl >= 0 ? 'up' : 'down'}">${(d.todayPnl>=0?'+':'') + d.todayPnl.toLocaleString()}</div>
      <div class="total ${d.hasCost && d.unPnl !== 0 ? (d.unPnl >= 0 ? 'up' : 'down') : ''}">${totalHtml}</div>
      <div class="act">
        <button onclick="openEditModal('${s.id}')">✎</button>
        <button onclick="deleteStock('${s.id}')">✕</button>
      </div>
    </div>`;
  }).join('');
  
  updateSummary();
}

function updateSummary() {
  let pnl = 0, asset = 0, totalUnPnl = 0, hasUnPnl = false;
  state.stocks[state.currentTab].forEach(s => {
    const d = getCalculatedData(s);
    pnl += d.todayPnl; asset += d.mktValue;
    if (d.hasCost && d.price != null) { totalUnPnl += d.unPnl; hasUnPnl = true; }
  });
  
  document.getElementById('totalPnl').textContent = (pnl >= 0 ? '+' : '') + pnl.toLocaleString();
  document.getElementById('totalPnl').className = 'val ' + (pnl >= 0 ? 'up' : 'down');
  document.getElementById('totalAsset').textContent = asset.toLocaleString();
  document.getElementById('totalUnrealized').textContent = hasUnPnl ? (totalUnPnl >= 0 ? '+' : '') + totalUnPnl.toLocaleString() : '—';
  document.getElementById('totalUnrealized').className = 'val ' + (hasUnPnl ? (totalUnPnl >= 0 ? 'up' : 'down') : 'neutral');
}

/* =================== 增刪改查 =================== */
function addStock() {
  let sym = document.getElementById('symInput').value.trim().toUpperCase().replace(/[^A-Z0-9]/g, '');
  const qty = parseInt(document.getElementById('qtyInput').value);
  const unit = document.getElementById('unitSelect').value;
  const bp = parseFloat(document.getElementById('buyPriceInput').value);
  
  if (!sym || !qty || qty < 1) { showToast('請完整輸入'); return; }
  if (state.stocks[state.currentTab].some(s => s.symbol === sym)) { showToast('股票已存在'); return; }

  const newStock = {
    id: 's_' + Date.now(), symbol: sym, name: STOCK_DICT[sym] || '',
    displayQty: qty, displayUnit: unit, buyPrice: (isNaN(bp) || bp <= 0) ? null : bp,
    price: null, change: null, changePercent: null
  };
  
  state.stocks[state.currentTab].push(newStock);
  lsSetJSON(`tw_stock_portfolio_tab_${state.currentTab}`, state.stocks[state.currentTab]);
  closeModal('addModalOverlay'); renderAll(); forceRefresh();
}

function deleteStock(id) {
  if (!confirm('確定刪除？')) return;
  state.stocks[state.currentTab] = state.stocks[state.currentTab].filter(s => s.id !== id);
  lsSetJSON(`tw_stock_portfolio_tab_${state.currentTab}`, state.stocks[state.currentTab]);
  renderAll();
}

function openEditModal(id) {
  const s = state.stocks[state.currentTab].find(x => x.id === id);
  if (!s) return;
  document.getElementById('editId').value = s.id;
  document.getElementById('editSymInput').value = s.symbol;
  document.getElementById('editNameInput').value = s.name || '';
  document.getElementById('editQtyInput').value = s.displayQty;
  document.getElementById('editUnitSelect').value = s.displayUnit;
  document.getElementById('editBuyPriceInput').value = s.buyPrice || '';
  openModal('editModalOverlay');
}

function saveEditStock() {
  const id = document.getElementById('editId').value;
  const s = state.stocks[state.currentTab].find(x => x.id === id);
  if (!s) return;
  
  s.symbol = document.getElementById('editSymInput').value.trim().toUpperCase().replace(/[^A-Z0-9]/g, '') || s.symbol;
  s.name = document.getElementById('editNameInput').value.trim();
  s.displayQty = parseInt(document.getElementById('editQtyInput').value) || s.displayQty;
  s.displayUnit = document.getElementById('editUnitSelect').value;
  const bp = parseFloat(document.getElementById('editBuyPriceInput').value);
  s.buyPrice = (isNaN(bp) || bp <= 0) ? null : bp;
  
  lsSetJSON(`tw_stock_portfolio_tab_${state.currentTab}`, state.stocks[state.currentTab]);
  closeModal('editModalOverlay'); renderAll(); forceRefresh();
}

/* =================== API 報價更新邏輯 =================== */
function getActiveKey() {
  const keys = [state.fugleKey, state.secondFugleKey].filter(k => k);
  if (!keys.length) return null;
  const k = keys[keyIndex % keys.length]; keyIndex++; return k;
}

async function fetchPrices() {
  if (navigator.onLine === false) return;
  
  // 抓取台股大盤
  try {
    const key = getActiveKey();
    const res = await fetch(`${FUGLE}IX0001`, { headers: { 'X-API-KEY': key } }).then(r => r.ok ? r.json() : null);
    if (res && res.price) {
      const idxEl = document.getElementById('idxPrice');
      idxEl.textContent = res.price.toLocaleString('en-US', {maximumFractionDigits:0});
      document.getElementById('idxChange').textContent = (res.change >= 0 ? '+' : '') + res.change;
      document.getElementById('idxPct').textContent = `(${res.changePercent >= 0 ? '+' : ''}${res.changePercent}%)`;
    }
  } catch(e) {}

  // 抓取自選持股
  let hasUpdates = false;
  for (let tab of state.stocks) {
    for (let s of tab) {
      const key = getActiveKey();
      if (!key) break;
      try {
        const d = await fetch(`${FUGLE}${s.symbol}`, { headers: { 'X-API-KEY': key } }).then(r => r.ok ? r.json() : null);
        if (d && d.price) {
          s.price = d.price; s.change = d.change; s.changePercent = d.changePercent;
          if (d.name && !s.name) s.name = d.name;
          hasUpdates = true;
        }
      } catch(e) {}
    }
  }
  
  if (hasUpdates) {
    state.stocks.forEach((tab, i) => lsSetJSON(`tw_stock_portfolio_tab_${i}`, tab));
    renderAll();
  }
}

let refreshTimer;
function forceRefresh() {
  clearTimeout(refreshTimer);
  fetchPrices();
  refreshTimer = setTimeout(forceRefresh, currentInterval);
}

/* =================== 其他功能 (新聞、歷史、設定) =================== */
function toggleSummary() {
  const d = document.getElementById('summaryDetails'), b = document.getElementById('sumToggleBtn');
  const isHidden = d.style.display === 'none';
  d.style.display = isHidden ? 'block' : 'none'; b.style.display = isHidden ? 'none' : 'block';
}

function saveSettings() {
  state.tabCount = parseInt(document.getElementById('tabCountSelect').value);
  state.fugleKey = document.getElementById('fugleKeyInput').value.trim();
  state.secondFugleKey = document.getElementById('secondFugleKeyInput').value.trim();
  
  lsSet('tw_tab_count', state.tabCount);
  lsSet('tw_fugle_key', state.fugleKey);
  lsSet('tw_second_fugle_key', state.secondFugleKey);
  
  if (state.currentTab >= (state.tabCount || 1)) { state.currentTab = 0; lsSet('tw_current_tab', 0); }
  
  closeModal('settingsModalOverlay'); renderTabs(); forceRefresh(); showToast('設定已儲存');
}

function toggleTicker() {
  state.showTicker = !state.showTicker;
  lsSet('tw_show_ticker', state.showTicker);
  document.getElementById('tickerContainer').style.display = state.showTicker ? 'flex' : 'none';
}

async function loadFinanceNews() {
  const ticker = document.getElementById('js-ticker');
  try {
    const res = await fetch('https://finance-news-api.denis0521.workers.dev/').then(r => r.json());
    if (res.length) {
      ticker.innerHTML = res.map(i => `<a href="${i.link}" target="_blank" class="ticker-item"><span class="ticker-source">${i.source}</span>${i.title}</a>`).join('');
      ticker.style.animationDuration = `${ticker.textContent.length * 0.18}s`;
    }
  } catch { ticker.innerHTML = '<span class="ticker-item">無法載入即時新聞</span>'; }
}

function saveDailyPnl() {
  let pnl = 0;
  state.stocks[state.currentTab].forEach(s => pnl += getCalculatedData(s).todayPnl);
  
  const now = new Date();
  state.records[state.currentTab].unshift({
    date: `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`,
    time: `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`,
    totalPnl: pnl, timestamp: now.getTime()
  });
  
  if (state.records[state.currentTab].length > 50) state.records[state.currentTab].pop();
  lsSetJSON(`tw_records_tab_${state.currentTab}`, state.records[state.currentTab]);
  renderHistory(); showToast('已存儲今日損益');
}

function renderHistory() {
  const hb = document.getElementById('historyBody');
  const rec = state.records[state.currentTab];
  hb.innerHTML = rec.length ? rec.map(r => `
    <div class="hist-item" style="border:1px solid var(--protrude-d)">
      <div><span class="hdate">${r.date} ${r.time}</span> <strong class="${r.totalPnl >= 0 ? 'up' : 'down'}">${r.totalPnl >= 0 ? '+' : ''}${r.totalPnl.toLocaleString()}</strong></div>
      <button onclick="deleteHistory(${r.timestamp})" style="padding:4px 8px;">刪除</button>
    </div>
  `).join('') : '<div style="text-align:center; color:var(--t-muted);">尚無記錄</div>';
}

function deleteHistory(ts) {
  state.records[state.currentTab] = state.records[state.currentTab].filter(r => r.timestamp !== ts);
  lsSetJSON(`tw_records_tab_${state.currentTab}`, state.records[state.currentTab]);
  renderHistory();
}

// Service Worker 註冊
if ('serviceWorker' in navigator) { window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js')); }

// 啟動應用
init();
</script>
