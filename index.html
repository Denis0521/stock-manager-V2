<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#e0e5ec">
    <meta name="description" content="股票庫存管理 PWA - 即時追蹤持股損益">
    <title>股票庫存管理</title>
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" type="image/svg+xml" href="./icon.svg">
    <style>
        :root {
            --bg: #e0e5ec;
            --text: #4a4a4a;
            --shadow-light: #ffffff;
            --shadow-dark: #a3b1c6;
            --red: #d93025;
            --green: #188038;
            --accent: #1a73e8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            padding: 20px;
            min-height: 100vh;
            transition: opacity 0.3s ease;
        }

        /* Neumorphism Utilities */
        .neu-panel {
            background: var(--bg);
            border-radius: 20px;
            box-shadow: 8px 8px 16px var(--shadow-dark), -8px -8px 16px var(--shadow-light);
            padding: 20px;
            margin-bottom: 20px;
        }

        .neu-btn {
            border: none;
            outline: none;
            background: var(--bg);
            color: var(--text);
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light);            transition: all 0.2s ease;
            user-select: none;
        }

        .neu-btn:active, .neu-btn.active {
            box-shadow: inset 5px 5px 10px var(--shadow-dark), inset -5px -5px 10px var(--shadow-light);
            color: var(--accent);
        }

        .neu-input {
            width: 100%;
            border: none;
            outline: none;
            background: var(--bg);
            padding: 12px 16px;
            border-radius: 12px;
            box-shadow: inset 5px 5px 10px var(--shadow-dark), inset -5px -5px 10px var(--shadow-light);
            color: var(--text);
            font-size: 16px;
            margin-bottom: 10px;
        }

        /* Layout & Components */
        header { text-align: center; margin-bottom: 25px; }
        h1 { font-size: 1.5rem; margin-bottom: 5px; }
        .subtitle { font-size: 0.8rem; opacity: 0.7; }

        .tabs { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
        
        .market-index {
            text-align: center;
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 20px;
            min-height: 24px;
        }

        .stock-list { display: flex; flex-direction: column; gap: 15px; }
        .stock-card {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
            align-items: center;
        }
        .stock-info h3 { font-size: 1rem; margin-bottom: 4px; }
        .stock-meta { font-size: 0.8rem; opacity: 0.8; }
        .stock-stats { text-align: right; font-size: 0.9rem; line-height: 1.4; }
        .up { color: var(--red); }
        .down { color: var(--green); }
        .summary-bar {
            position: sticky;
            bottom: 20px;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
        }

        /* Modal / Settings */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(224, 229, 236, 0.9);
            backdrop-filter: blur(5px);
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal-overlay.open { display: flex; }
        .modal-content { width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
        .setting-row { margin-bottom: 15px; }
        .setting-label { display: block; font-size: 0.9rem; margin-bottom: 8px; font-weight: 600; }
        .version-tag { text-align: center; font-size: 0.75rem; opacity: 0.5; margin-top: 20px; }

        /* Loading State */
        .skeleton {
            background: linear-gradient(90deg, var(--bg) 25%, #d1d9e6 50%, var(--bg) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
            height: 1em;
            width: 60%;
            display: inline-block;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* Toast Notification */
        .toast {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            background: #333; color: #fff; padding: 10px 20px; border-radius: 20px;
            font-size: 0.9rem; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 200;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="neu-panel">
        <h1>股票庫存管理</h1>
        <div class="subtitle">🌙 進階 · 分頁 A · 分頁 B · 分頁 C</div>
    </header>

    <!-- Add Stock Form -->
    <section class="neu-panel">
        <div style="display: flex; gap: 10px; align-items: flex-end;">
            <div style="flex: 1;">
                <input type="text" id="newSymbol" class="neu-input" placeholder="代號 (如 2330)" style="margin-bottom: 0;">
            </div>
            <div style="width: 80px;">
                <input type="number" id="newShares" class="neu-input" placeholder="張數" style="margin-bottom: 0;">
            </div>
            <button class="neu-btn" onclick="app.addStock()">＋ 新增</button>
        </div>
    </section>

    <!-- Market Index -->
    <div class="market-index" id="marketIndex">臺灣加權指數 — <span class="skeleton"></span></div>

    <!-- Stock List -->
    <div id="stockList" class="stock-list">
        <div class="neu-panel" style="text-align: center; opacity: 0.6;">尚無持股，請在上方新增</div>
    </div>

    <!-- Summary Sticky Bar -->
    <div class="neu-panel summary-bar">
        <div>今日損益總計 <span id="dailyPnl">+0</span></div>
        <button class="neu-btn" onclick="app.toggleMenu()">▼</button>
    </div>

    <!-- Expandable Menu -->
    <div id="expandMenu" class="neu-panel" style="display: none; margin-top: -10px; padding-top: 30px;">
        <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
            <span>總未實現損益 (ROI)</span>
            <span id="totalRoi">—</span>
        </div>
        <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
            <span>持股資產總計</span>
            <span id="totalAssets">0</span>
        </div>
        <button class="neu-btn" style="width: 100%; margin-bottom: 10px;" onclick="app.saveDailySnapshot()">存儲今日損益總計</button>
        <button class="neu-btn" style="width: 100%; margin-bottom: 10px;" onclick="app.showHistory()">歷史記錄</button>
        <button class="neu-btn" style="width: 100%;" onclick="app.openSettings()">⚙️ 進階設定</button>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal-overlay">        <div class="neu-panel modal-content">
            <h2 style="margin-bottom: 20px;">進階設定</h2>
            
            <div class="setting-row">
                <label class="setting-label">Fugle API Key（主要）</label>
                <input type="password" id="apiKey1" class="neu-input" placeholder="輸入主要 API Key">
            </div>
            <div class="setting-row">
                <label class="setting-label">Fugle API Key 2（備用）</label>
                <input type="password" id="apiKey2" class="neu-input" placeholder="輸入備用 API Key">
            </div>
            <div class="setting-row">
                <a href="https://developer.fugle.tw/docs/key/" target="_blank" style="color: var(--accent); font-size: 0.9rem;">🔗 申請 Fugle API Key</a>
            </div>

            <hr style="border: none; border-top: 1px solid var(--shadow-dark); margin: 20px 0; opacity: 0.3;">

            <div class="setting-row">
                <label class="setting-label">資料備份與還原</label>
                <div style="display: flex; gap: 10px;">
                    <button class="neu-btn" style="flex:1;" onclick="app.exportBackup()">📥 匯出備份</button>
                    <button class="neu-btn" style="flex:1;" onclick="document.getElementById('importFile').click()">📤 匯入還原</button>
                    <input type="file" id="importFile" accept=".json" style="display:none" onchange="app.importBackup(this)">
                </div>
            </div>

            <div class="version-tag">核心版本：V3.5.4 (Fugle 優化版)</div>
            
            <button class="neu-btn" style="width: 100%; margin-top: 20px;" onclick="app.saveSettings()">儲存設定並關閉</button>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

<script>
/**
 * ==========================================
 * Fugle API 請求管理器 (針對免費版優化)
 * ==========================================
 */
const FugleRequestManager = {
    queue: [],
    processing: false,
    baseDelay: 300,       // 請求間隔 (ms)，防止瞬時併發
    retryDelay: 1000,     // 初始退避時間
    maxRetryDelay: 30000, // 最大退避上限
    
    async enqueue(fetchFn) {
        return new Promise((resolve, reject) => {            this.queue.push({ fetchFn, resolve, reject });
            this.processQueue();
        });
    },

    async processQueue() {
        if (this.processing || this.queue.length === 0) return;
        this.processing = true;

        while (this.queue.length > 0) {
            const { fetchFn, resolve, reject } = this.queue.shift();
            try {
                const response = await fetchFn();
                
                if (response.status === 429) {
                    const retryAfter = parseInt(response.headers.get('Retry-After') || '0', 10);
                    const delay = retryAfter > 0 
                        ? retryAfter * 1000 
                        : Math.min(this.retryDelay, this.maxRetryDelay);
                    
                    this.retryDelay = Math.min(this.retryDelay * 2, this.maxRetryDelay);
                    console.warn(`[Fugle] 429 Rate Limited. Retry after ${delay}ms`);
                    
                    await new Promise(r => setTimeout(r, delay));
                    this.queue.unshift({ fetchFn, resolve, reject });
                } else {
                    this.retryDelay = 1000;
                    resolve(response);
                }
            } catch (err) {
                reject(err);
            }
            
            if (this.queue.length > 0) {
                await new Promise(r => setTimeout(r, this.baseDelay));
            }
        }
        this.processing = false;
    }
};

/**
 * ==========================================
 * App Core Logic
 * ==========================================
 */
const app = {
    stocks: JSON.parse(localStorage.getItem('stocks') || '[]'),
    settings: JSON.parse(localStorage.getItem('settings') || '{}'),
        init() {
        this.render();
        this.updateMarketIndex();
        this.registerSW();
    },

    registerSW() {
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then(() => console.log('[App] SW registered'))
                .catch(err => console.error('[App] SW failed:', err));
        }
    },

    // --- API Calls via Queue Manager ---
    async fetchQuote(symbol) {
        const key = this.settings.apiKey1 || this.settings.apiKey2;
        if (!key) return null;

        try {
            const res = await FugleRequestManager.enqueue(() =>
                fetch(`https://api.fugle.tw/marketdata/v1.0/stock/intraday/quote/${symbol}`, {
                    headers: { 'X-API-Key': key }
                })
            );
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            return await res.json();
        } catch (e) {
            console.error(`[App] Fetch ${symbol} failed:`, e);
            return null;
        }
    },

    async updateMarketIndex() {
        const el = document.getElementById('marketIndex');
        const data = await this.fetchQuote('TWII');
        if (data && data.lastPrice) {
            const change = data.change || 0;
            const cls = change >= 0 ? 'up' : 'down';
            const sign = change >= 0 ? '+' : '';
            el.innerHTML = `臺灣加權指數 ${data.lastPrice.toFixed(2)} <span class="${cls}">${sign}${change.toFixed(2)}</span>`;
        } else {
            el.textContent = '臺灣加權指數 — 無法取得';
        }
    },

    // --- Stock Management ---
    addStock() {
        const symbol = document.getElementById('newSymbol').value.trim().toUpperCase();
        const shares = parseFloat(document.getElementById('newShares').value);        if (!symbol || isNaN(shares)) return this.showToast('請輸入有效代號與張數');

        if (this.stocks.find(s => s.symbol === symbol)) {
            return this.showToast('該代號已存在');
        }

        this.stocks.push({ symbol, shares, avgPrice: 0, lastPrice: 0, change: 0 });
        this.save();
        this.render();
        this.refreshQuotes();
        
        document.getElementById('newSymbol').value = '';
        document.getElementById('newShares').value = '';
    },

    async refreshQuotes() {
        for (let stock of this.stocks) {
            const data = await this.fetchQuote(stock.symbol);
            if (data) {
                stock.lastPrice = data.lastPrice || 0;
                stock.change = data.change || 0;
                // 若尚未設定均價，以現價作為預設參考
                if (stock.avgPrice === 0) stock.avgPrice = stock.lastPrice;
            }
        }
        this.save();
        this.render();
    },

    render() {
        const list = document.getElementById('stockList');
        if (this.stocks.length === 0) {
            list.innerHTML = '<div class="neu-panel" style="text-align:center;opacity:0.6;">尚無持股，請在上方新增</div>';
            document.getElementById('dailyPnl').textContent = '+0';
            document.getElementById('totalRoi').textContent = '—';
            document.getElementById('totalAssets').textContent = '0';
            return;
        }

        let totalDailyPnl = 0;
        let totalCost = 0;
        let totalValue = 0;

        list.innerHTML = this.stocks.map(s => {
            const dailyPnl = s.change * s.shares * 1000;
            const value = s.lastPrice * s.shares * 1000;
            const cost = s.avgPrice * s.shares * 1000;
            const unrealized = value - cost;
            const roi = cost > 0 ? ((unrealized / cost) * 100).toFixed(2) : '0.00';
                        totalDailyPnl += dailyPnl;
            totalCost += cost;
            totalValue += value;

            const cls = s.change >= 0 ? 'up' : 'down';
            const sign = s.change >= 0 ? '+' : '';

            return `
                <div class="neu-panel stock-card">
                    <div class="stock-info">
                        <h3>${s.symbol}</h3>
                        <div class="stock-meta">庫存 ${s.shares} 張 · 均價 ${s.avgPrice.toFixed(2)}</div>
                    </div>
                    <div class="stock-stats">
                        <div class="${cls}">${s.lastPrice.toFixed(2)} (${sign}${s.change.toFixed(2)})</div>
                        <div class="${cls}">今:${(dailyPnl/1000).toFixed(1)}k · 總:${(unrealized/1000).toFixed(1)}k</div>
                        <div style="font-size:0.75rem;opacity:0.7;">ROI ${roi}%</div>
                    </div>
                </div>
            `;
        }).join('');

        const pnlSign = totalDailyPnl >= 0 ? '+' : '';
        const pnlCls = totalDailyPnl >= 0 ? 'up' : 'down';
        document.getElementById('dailyPnl').innerHTML = `<span class="${pnlCls}">${pnlSign}${(totalDailyPnl/1000).toFixed(1)}k</span>`;
        
        const totalUnrealized = totalValue - totalCost;
        const totalRoi = totalCost > 0 ? ((totalUnrealized / totalCost) * 100).toFixed(2) + '%' : '—';
        document.getElementById('totalRoi').textContent = `${(totalUnrealized/1000).toFixed(1)}k (${totalRoi})`;
        document.getElementById('totalAssets').textContent = `${(totalValue/1000).toFixed(1)}k`;
    },

    save() {
        localStorage.setItem('stocks', JSON.stringify(this.stocks));
    },

    // --- UI Interactions ---
    toggleMenu() {
        const menu = document.getElementById('expandMenu');
        menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
    },

    showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2000);
    },

    // --- Settings & Backup ---    openSettings() {
        document.getElementById('apiKey1').value = this.settings.apiKey1 || '';
        document.getElementById('apiKey2').value = this.settings.apiKey2 || '';
        document.getElementById('settingsModal').classList.add('open');
    },

    saveSettings() {
        this.settings.apiKey1 = document.getElementById('apiKey1').value.trim();
        this.settings.apiKey2 = document.getElementById('apiKey2').value.trim();
        localStorage.setItem('settings', JSON.stringify(this.settings));
        document.getElementById('settingsModal').classList.remove('open');
        this.showToast('設定已儲存');
        this.refreshQuotes();
        this.updateMarketIndex();
    },

    exportBackup() {
        const data = { stocks: this.stocks, settings: this.settings, version: '3.5.4', date: new Date().toISOString() };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `stock-backup-${new Date().toISOString().slice(0,10)}.json`;
        a.click();
    },

    importBackup(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const data = JSON.parse(e.target.result);
                if (data.stocks) {
                    this.stocks = data.stocks;
                    this.save();
                    this.render();
                    this.showToast('匯入成功');
                } else {
                    this.showToast('檔案格式不正確');
                }
            } catch {
                this.showToast('匯入失敗，請檢查檔案');
            }
        };
        reader.readAsText(file);
        input.value = '';
    },

    saveDailySnapshot() {
        this.showToast('今日損益已記錄（功能預留）');    },

    showHistory() {
        this.showToast('歷史記錄（功能預留）');
    }
};

// Initialize
document.addEventListener('DOMContentLoaded', () => app.init());
</script>
</body>
</html>
