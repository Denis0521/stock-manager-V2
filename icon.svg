<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <filter id="neu-plate" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="16" dy="16" stdDeviation="22" flood-color="#838b96" flood-opacity="0.7"/>
      <feDropShadow dx="-16" dy="-16" stdDeviation="22" flood-color="#ffffff" flood-opacity="0.85"/>
    </filter>
    <linearGradient id="surface" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e2e7ec"/>
      <stop offset="100%" stop-color="#b0b8c4"/>
    </linearGradient>
    <linearGradient id="engraved" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#bac5d1"/>
      <stop offset="50%" stop-color="#d8e1e9"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <filter id="neon-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="8" dy="12" stdDeviation="12" flood-color="#90100a" flood-opacity="0.5"/>
    </filter>
    <linearGradient id="tube-red" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff4757"/>
      <stop offset="100%" stop-color="#c81d25"/>
    </linearGradient>
    <filter id="glare">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
    <radialGradient id="ruby" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ff8a80"/>
      <stop offset="40%" stop-color="#e50914"/>
      <stop offset="100%" stop-color="#5c0002"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" fill="#cbd2da"/>
  <rect x="64" y="64" width="384" height="384" rx="88" fill="url(#surface)" filter="url(#neu-plate)"/>
  <rect x="112" y="310" width="36" height="90" rx="18" fill="url(#engraved)"/>
  <rect x="192" y="270" width="36" height="130" rx="18" fill="url(#engraved)"/>
  <rect x="272" y="210" width="36" height="190" rx="18" fill="url(#engraved)"/>
  <rect x="352" y="140" width="36" height="260" rx="18" fill="url(#engraved)"/>
  <g filter="url(#neon-glow)">
    <path d="M130,310 C170,310 170,270 210,270 C250,270 250,210 290,210 C330,210 330,140 370,140" 
          fill="none" stroke="url(#tube-red)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <path d="M130,307 C170,307 170,267 210,267 C250,267 250,207 290,207 C330,207 330,137 370,137" 
        fill="none" stroke="#ffb3b8" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" 
        filter="url(#glare)" opacity="0.85"/>
  <g filter="url(#neon-glow)">
    <circle cx="370" cy="140" r="24" fill="url(#ruby)"/>
  </g>
  <circle cx="362" cy="132" r="6" fill="#ffffff" filter="url(#glare)" opacity="0.9"/>
</svg>
